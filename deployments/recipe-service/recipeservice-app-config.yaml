apiVersion: v1
kind: ConfigMap
metadata:
  name: tk-recipeservice-config
# Tylko NIE-sekrety. Sekrety -> cookbook-server-secrets (Secret).
# Same-origin: front i API na tej samej domenie (routing po stronie ingress),
# więc WEB_URL == APP_URL == publiczny host. WEB_URL zasila CORS + Better Auth
# trustedOrigins; ustaw realny host przed deployem.
data:
  NODE_ENV: "production"
  PORT: "3001"
  WEB_URL: "https://recipes.app.legacybuster.com"
  APP_URL: "https://recipes.app.legacybuster.com"
