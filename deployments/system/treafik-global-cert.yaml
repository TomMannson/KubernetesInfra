apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: legacybuster-wildcard
  namespace: kube-system
spec:
  secretName: legacybuster-wildcard-tls
  issuerRef:
    name: letsencrypt-clusterIssuer-prod
    kind: ClusterIssuer
  dnsNames:
    - "*.app.legacybuster.com"
    - "*.lab.legacybuster.com"
    - "*.admin.legacybuster.com"
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  duration: 2160h
  renewBefore: 360h