apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  # Proste klucz-wartość
  SPRING_PROFILES_ACTIVE: "prod"
  LOG_LEVEL: "INFO"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-broker.kafka.svc.cluster.local:9092"
  KAFKA_CONSUMER_GROUP: "vip-onboarding-consumer"
  
  # Feature flagi
  FEATURE_AXYTOS_ENABLED: "true"
  FEATURE_EPI_ENABLED: "false"
  
  # Cały plik konfiguracyjny jako wartość
  application.yaml: |
    spring:
      application:
        name: vip-onboarding
      datasource:
        url: jdbc:postgresql://postgres.vip.svc.cluster.local:5432/vip
        hikari:
          maximum-pool-size: 20
          minimum-idle: 5
      kafka:
        consumer:
          auto-offset-reset: earliest
          enable-auto-commit: false
        producer:
          acks: all
          transaction-id-prefix: vip-tx-
    
    management:
      endpoints:
        web:
          exposure:
            include: health,info,prometheus
      endpoint:
        health:
          probes:
            enabled: true
    
    logging:
      level:
        root: INFO
        com.vrpayment.vip: DEBUG