apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: recipe-service
  namespace: flux-system
spec:
  interval: 30m0s
  path: ./deployments/recipe-service
  prune: true
  retryInterval: 2m0s
  sourceRef:
    kind: GitRepository
    name: recipe-service
  targetNamespace: tk-recipe-service
  timeout: 3m0s
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: recipe-service
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: main
  url: https://github.com/TomMannson/KubernetesInfra